name: Backend CI

on:
  push:
    paths:
      - "be/**"
  pull_request:
    paths:
      - "be/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: be

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test