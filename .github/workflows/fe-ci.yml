name: Frontend CI

on:
  push:
    paths:
      - "fe/**"
  pull_request:
    paths:
      - "fe/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build