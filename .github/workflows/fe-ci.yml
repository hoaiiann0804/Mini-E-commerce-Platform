name: Backend CI
on:
  push:
    paths:
      - "fe/**"
  pull_request:
    paths:
      - "fe/**"
jobs:
  test:
    runs-on: unbuntu-lastest
    defaults:
      run:
        working-directory: fe
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: checkout code
        uses: actions/checkout@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
