services:
  db:
    image: postgres:15
    container_name: e-commerce-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-websitebanhangmini}
    mem_limit: 1g
    cpus: 0.5
    ports:
      - "6000:5432"
    volumes:
      - pgdata_ecommerce:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ../../be
      dockerfile: Dockerfile.dev
    container_name: e-commerce-web
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    dns_opt:
      - use-vc
    ports:
      - "8888:8888"
    env_file:
      - ../../be/.env
      - ../../ops/env/.env.dev
    environment:
      NODE_OPTIONS: --dns-result-order=ipv4first
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../../be:/app
      - ../../uploads:/app/uploads
      - api_node_modules:/app/node_modules
    command: sh -c "if [ ! -x node_modules/.bin/nodemon ]; then npm install; fi; npm run dev -- --legacy-watch"
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      db:
        condition: service_healthy
  pgadmin:
    image: dpage/pgadmin4
    container_name: e-commerce-pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata_ecommerce:
    name: e-commrcemini_pgdata_ecommerce
  pgadmin_data:
  api_node_modules:
